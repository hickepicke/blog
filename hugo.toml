baseURL = "https://hicke.se/"
title = "hicke.se"
theme = "PaperMod"
defaultContentLanguage = "sv"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true

[languages]
  [languages.sv]
    languageName = "Svenska"
    weight = 1
    contentDir = "content/sv"
    title = "hicke.se"
    [languages.sv.params]
      description = "En blogg av Henrik"
    [[languages.sv.menu.main]]
      identifier = "arkiv"
      name = "Arkiv"
      url = "/arkiv/"
      weight = 10
    [[languages.sv.menu.main]]
      identifier = "taggar"
      name = "Taggar"
      url = "/tags/"
      weight = 20

  [languages.en]
    languageName = "English"
    weight = 2
    contentDir = "content/en"
    title = "hicke.se"
    [languages.en.params]
      description = "A blog by Henrik"
    [[languages.en.menu.main]]
      identifier = "archive"
      name = "Archive"
      url = "/en/archive/"
      weight = 10
    [[languages.en.menu.main]]
      identifier = "tags"
      name = "Tags"
      url = "/en/tags/"
      weight = 20

[params]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowShareButtons = false
  ShowRssButtonInSectionTermList = true
  ShowToc = false
  comments = false

[outputs]
  home = ["HTML", "RSS", "JSON"]
